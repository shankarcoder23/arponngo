<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer | Arpon NGO</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e3f2fd, #ffffff);
  font-family: 'Segoe UI', sans-serif;
}

.volunteer-card {
  border: none;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  background: #fff;
}

.form-control, .form-select {
  border-radius: 10px;
  padding: 12px;
}

.form-control:focus {
  box-shadow: 0 0 0 0.2rem rgba(25,135,84,0.2);
  border-color: #198754;
}

.btn-success {
  border-radius: 10px;
  padding: 12px;
  font-weight: 600;
  transition: 0.3s;
}

.btn-success:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(25,135,84,0.3);
}

h2 {
  color: #198754;
}

.success-box {
  border-radius: 10px;
  animation: fadeIn 0.5s ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>

<body>

<section class="py-5">
  <div class="container">
    
    <h2 class="text-center fw-bold mb-4">Become a Volunteer</h2>

    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7 col-sm-12">

        <div class="card volunteer-card p-4">

          <form id="volunteerForm">

            <div class="form-floating mb-3">
              <input type="text" class="form-control" placeholder="Full Name" required>
              <label>Full Name</label>
            </div>

            <div class="form-floating mb-3">
              <input type="email" class="form-control" placeholder="Email Address" required>
              <label>Email Address</label>
            </div>

            <div class="form-floating mb-3">
              <input type="tel" class="form-control" placeholder="Phone Number" required>
              <label>Phone Number</label>
            </div>

            <div class="mb-3">
              <select class="form-select" required>
                <option selected disabled>Select Area of Interest</option>
                <option>Healthcare</option>
                <option>Education</option>
                <option>Event Support</option>
              </select>
            </div>

            <div class="form-floating mb-3">
              <textarea class="form-control" style="height: 100px;" placeholder="Why do you want to volunteer?"></textarea>
              <label>Why do you want to volunteer?</label>
            </div>

            <button class="btn btn-success w-100" id="submitBtn">
              <span id="btnText">Submit Application</span>
            </button>

            <div class="alert alert-success mt-3 d-none success-box text-center" id="successMsg">
               Thank you! We will contact you soon.
            </div>

          </form>

        </div>

      </div>
    </div>

  </div>
</section>

<script>
const form = document.getElementById("volunteerForm");
const btnText = document.getElementById("btnText");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  btnText.innerHTML = "Submitting...";
  
  setTimeout(() => {
    btnText.innerHTML = "Submitted ✓";
    successMsg.classList.remove("d-none");
    form.reset();
  }, 1500);
});
</script>

</body>
</html>
