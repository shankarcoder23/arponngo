<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volunteer | Arpon NGO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<section class="py-5">
  <div class="container">
    <h2 class="text-center fw-bold mb-4">Become a Volunteer</h2>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <form class="shadow p-4 rounded bg-light">

          <input type="text" class="form-control mb-3" placeholder="Full Name" required>

          <input type="email" class="form-control mb-3" placeholder="Email Address" required>

          <input type="tel" class="form-control mb-3" placeholder="Phone Number" required>

          <select class="form-control mb-3">
            <option>Select Area of Interest</option>
            <option>Healthcare</option>
            <option>Education</option>
            <option>Event Support</option>
          </select>

          <textarea class="form-control mb-3" rows="4" placeholder="Why do you want to volunteer?"></textarea>

          <button class="btn btn-success w-100" id="submitBtn">
  <span id="btnText">Submit Application</span>
</button>
<div class="alert alert-success mt-3 d-none" id="successMsg">
   Thank you! We will contact you soon.
</div>
        </form>

      </div>
    </div>
  </div>
</section>

<script id="formjs">
const form = document.querySelector("form");
const btnText = document.getElementById("btnText");
const successMsg = document.getElementById("successMsg");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  btnText.innerHTML = "Submitting...";
  
  setTimeout(() => {
    btnText.innerHTML = "Submitted ✓";
    successMsg.classList.remove("d-none");
    form.reset();
  }, 1500);
});
</script>

</body>
</html>
